name: Get Unity License                                                    
on:                                                                        
    workflow_dispatch:                                                       
jobs:                                                                      
    activation:                                                              
      name: Get ALF File                                                     
      runs-on: ubuntu-latest                                                 
      steps:                                                                 
        - uses: actions/checkout@v4                                          
        - name: Install Unity Hub                                            
          run: |                                                             
            wget -qO - https://hub.unity3d.com/linux/keys/public | gpg       
  --dearmor | sudo tee /usr/share/keyrings/Unity_Technologies_ApS.gpg >      
  /dev/null                                                                  
            sudo sh -c 'echo "deb                                            
  [signed-by=/usr/share/keyrings/Unity_Technologies_ApS.gpg]                 
  https://hub.unity3d.com/linux/repos/deb stable main" >
  /etc/apt/sources.list.d/unityhub.list'                                     
            sudo apt-get update                             
            sudo apt-get install -y unityhub                                 
        - name: Install Unity Editor                                         
          run: |                                                             
            sudo unityhub --headless install --version 2022.3.20f1 --module  
  linux-il2cpp &                                                             
            sleep 120                                                        
        - name: Generate ALF                                                 
          run: |                                                             
            /opt/unity/editors/2022.3.20f1/Editor/Unity -batchmode           
  -createManualActivationFile -logFile /tmp/unity.log || true                
            ls -la *.alf 2>/dev/null || ls -la /tmp/*.alf 2>/dev/null || find
   / -name "*.alf" 2>/dev/null | head -5                                     
        - uses: actions/upload-artifact@v4                  
          with:                                                              
            name: activation-file                           
            path: "*.alf"  
