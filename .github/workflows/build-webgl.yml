name: Build WebGL
on:
  workflow_dispatch:
jobs:
  build:
    name: Build Unity WebGL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch ProjectSettings activeInputHandler
        run: |
          sed -i 's/activeInputHandler: -1/activeInputHandler: 0/g' unity-client/ProjectSettings/ProjectSettings.asset || true
          grep -n "activeInputHandler" unity-client/ProjectSettings/ProjectSettings.asset || echo "not found, adding..."
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          targetPlatform: WebGL
          unityVersion: 2022.3.20f1
          buildMethod: WebGLBuilder.Build
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build/WebGL/WebGL
